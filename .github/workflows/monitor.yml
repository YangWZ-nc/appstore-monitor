name: "App Store Price Monitor"

on:
  # 每天凌晨 2 点 UTC（北京时间 10:00）全量扫描
  # 如果超时未完成，下次自动从断点继续
  schedule:
    - cron: "0 2 * * *"

  # 允许手动触发（方便调试）
  workflow_dispatch:
    inputs:
      batch_size:
        description: "分批处理数量（仅在非全量模式生效）"
        required: false
        default: "500"
      full_scan:
        description: "是否全量扫描（auto=自动判断, true=强制全量, false=分批）"
        required: false
        default: "auto"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  monitor:
    name: "Run Price Monitor"
    runs-on: ubuntu-latest
    timeout-minutes: 360        # 6 小时上限

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 判断是否需要全量扫描
      # 如果 progress=0 或者上次是全量模式且已完成（progress=0），则全量扫描
      # 如果 progress>0 且 < total，说明上次超时了，自动分批续跑
      - name: Determine scan mode
        id: scan_mode
        run: |
          PROGRESS=$(python -c "import json; print(json.load(open('monitor_progress.json')))" 2>/dev/null || echo "0")
          TOTAL=$(python -c "import json; d=json.load(open('watchlist.json')); print(len(d['apps']))" 2>/dev/null || echo "0")
          
          INPUT_MODE="${{ github.event.inputs.full_scan }}"
          echo "Progress: $PROGRESS / Total: $TOTAL / Input: $INPUT_MODE"
          
          if [ "$INPUT_MODE" = "false" ]; then
            # 手动指定分批模式
            echo "scan=0" >> $GITHUB_OUTPUT
            echo "Mode: Batch (manual)"
          elif [ "$PROGRESS" = "0" ] || [ "$PROGRESS" = "0.0" ]; then
            # 进度为 0，需要全量扫描
            echo "scan=1" >> $GITHUB_OUTPUT
            echo "Mode: Full scan"
          else
            # 有未完成的进度，分批续跑
            echo "scan=0" >> $GITHUB_OUTPUT
            echo "Mode: Batch resume from $PROGRESS"
          fi

      - name: Run monitor script
        env:
          BARK_KEY:    ${{ secrets.BARK_KEY }}
          BARK_SERVER: ${{ secrets.BARK_SERVER }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          MONITOR_BATCH_SIZE: ${{ github.event.inputs.batch_size || '500' }}
          MONITOR_FULL_SCAN:  ${{ steps.scan_mode.outputs.scan }}
        run: |
          python main.py

      - name: Commit and push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add history_prices.json index.html monitor_progress.json monitor.log || true

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            TIMESTAMP=$(date -u "+%Y-%m-%d %H:%M UTC")
            git commit -m "chore: update prices [${TIMESTAMP}] [skip ci]"
            git push
            echo "Data files committed and pushed."
          fi
