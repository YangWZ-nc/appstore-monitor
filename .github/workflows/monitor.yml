name: "App Store Price Monitor"

on:
  # 每 2 小时运行一次（自动续跑直到全量完成）
  # 凌晨 2 点 UTC 也会触发，确保每天至少有一次
  schedule:
    - cron: "15 */2 * * *"

  # 允许手动触发
  workflow_dispatch:
    inputs:
      batch_size:
        description: "分批处理数量（仅在非全量模式生效）"
        required: false
        default: "500"
      full_scan:
        description: "是否全量扫描（auto=自动判断, true=强制全量, false=分批）"
        required: false
        default: "auto"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  monitor:
    name: "Run Price Monitor"
    runs-on: ubuntu-latest
    timeout-minutes: 110        # 110 分钟，留余量给 commit/push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 判断扫描模式：
      # - progress >= total: 全量已完成，无需运行
      # - progress = 0: 从头开始（全量或分批）
      # - 0 < progress < total: 上次中断，分批续跑
      - name: Determine scan mode
        id: scan_mode
        run: |
          PROGRESS=$(python -c "import json; print(json.load(open('monitor_progress.json')))" 2>/dev/null || echo "0")
          TOTAL=$(python -c "import json; d=json.load(open('watchlist.json')); print(len(d['apps']))" 2>/dev/null || echo "0")
          
          INPUT_MODE="${{ github.event.inputs.full_scan }}"
          echo "Progress: $PROGRESS / Total: $TOTAL / Input: $INPUT_MODE"
          
          if [ "$INPUT_MODE" = "false" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "scan=0" >> $GITHUB_OUTPUT
            echo "Mode: Batch (manual)"
          elif [ "$INPUT_MODE" = "true" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "scan=1" >> $GITHUB_OUTPUT
            echo "Mode: Full scan (forced)"
          elif [ "$PROGRESS" -ge "$TOTAL" ] 2>/dev/null; then
            # 全量已完成，跳过本次运行
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "scan=0" >> $GITHUB_OUTPUT
            echo "Mode: Skip (scan completed)"
          else
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "scan=0" >> $GITHUB_OUTPUT
            echo "Mode: Batch resume from $PROGRESS"
          fi

      - name: Run monitor script
        if: steps.scan_mode.outputs.should_run == 'true'
        env:
          BARK_KEY:    ${{ secrets.BARK_KEY }}
          BARK_SERVER: ${{ secrets.BARK_SERVER }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          MONITOR_BATCH_SIZE: "1000"
          MONITOR_FULL_SCAN:  ${{ steps.scan_mode.outputs.scan }}
        run: |
          python main.py

      - name: Commit and push updated data
        if: steps.scan_mode.outputs.should_run == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add history_prices.json index.html monitor_progress.json monitor.log || true

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            TIMESTAMP=$(date -u "+%Y-%m-%d %H:%M UTC")
            git commit -m "chore: update prices [${TIMESTAMP}] [skip ci]"
            git push
            echo "Data files committed and pushed."
          fi

      - name: Reset progress for next cycle
        if: steps.scan_mode.outputs.should_run == 'true'
        run: |
          # 检查是否刚刚完成全量扫描
          PROGRESS=$(python -c "import json; print(json.load(open('monitor_progress.json')))" 2>/dev/null || echo "0")
          TOTAL=$(python -c "import json; d=json.load(open('watchlist.json')); print(len(d['apps']))" 2>/dev/null || echo "0")
          if [ "$PROGRESS" -ge "$TOTAL" ] 2>/dev/null; then
            echo "Full scan completed! Resetting progress for next daily cycle."
            echo "0" > monitor_progress.json
            git add monitor_progress.json
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: reset progress after full scan [skip ci]" || true
            git push || true
          fi
