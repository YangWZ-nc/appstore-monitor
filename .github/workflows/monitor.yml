name: "App Store Price Monitor"

on:
  # 每 6 小时运行一次（UTC 时间 0/6/12/18 点整）
  # 每天4次 × 每批200个 App = 每5天完成一轮完整扫描（962个App）
  schedule:
    - cron: "0 0,6,12,18 * * *"

  # 允许在 GitHub Actions 界面手动触发（方便调试）
  workflow_dispatch:
    inputs:
      batch_size:
        description: "本次处理的 App 数量（默认200）"
        required: false
        default: "200"

# 仓库写权限（用于 commit & push 更新后的数据文件）
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  monitor:
    name: "Run Price Monitor"
    runs-on: ubuntu-latest
    timeout-minutes: 90        # 最长允许运行 90 分钟

    steps:
      # ── 1. 检出仓库代码 ──────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. 设置 Python 环境 ──────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. 安装依赖 ──────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. 运行监控脚本 ──────────────────────────────────
      - name: Run monitor script
        env:
          BARK_KEY:    ${{ secrets.BARK_KEY }}
          BARK_SERVER: ${{ secrets.BARK_SERVER }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          MONITOR_BATCH_SIZE: ${{ github.event.inputs.batch_size || '200' }}
        run: |
          python main.py

      # ── 5. 提交并推送更新的数据文件 ──────────────────────
      - name: Commit and push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add history_prices.json index.html monitor_progress.json monitor.log || true

          if git diff --cached --quiet; then
            echo "No changes to commit — prices unchanged."
          else
            TIMESTAMP=$(date -u "+%Y-%m-%d %H:%M UTC")
            git commit -m "chore: update prices [${TIMESTAMP}] [skip ci]"
            git push
            echo "Data files committed and pushed successfully."
          fi
