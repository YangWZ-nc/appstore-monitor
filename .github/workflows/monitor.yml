name: "App Store Price Monitor"

on:
  # 每天凌晨 2 点 UTC（北京时间 10:00）全量扫描
  schedule:
    - cron: "0 2 * * *"

  # 允许在 GitHub Actions 界面手动触发（方便调试）
  workflow_dispatch:
    inputs:
      batch_size:
        description: "分批处理的 App 数量（设置 MONITOR_FULL_SCAN=1 时忽略此项）"
        required: false
        default: "500"
      full_scan:
        description: "是否全量扫描（true=扫全部，false=分批）"
        required: false
        default: "true"

# 仓库写权限（用于 commit & push 更新后的数据文件）
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  monitor:
    name: "Run Price Monitor"
    runs-on: ubuntu-latest
    timeout-minutes: 360        # 6 小时上限（全量扫描 23522 个 App 需要较长时间）

    steps:
      # ── 1. 检出仓库代码 ──────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. 设置 Python 环境 ──────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. 安装依赖 ──────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. 运行监控脚本 ──────────────────────────────────
      - name: Run monitor script
        env:
          BARK_KEY:    ${{ secrets.BARK_KEY }}
          BARK_SERVER: ${{ secrets.BARK_SERVER }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          MONITOR_BATCH_SIZE: ${{ github.event.inputs.batch_size || '500' }}
          MONITOR_FULL_SCAN:  ${{ github.event.inputs.full_scan || '1' }}
        run: |
          python main.py

      # ── 5. 提交并推送更新的数据文件 ──────────────────────
      - name: Commit and push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add history_prices.json index.html monitor_progress.json monitor.log || true

          if git diff --cached --quiet; then
            echo "No changes to commit — prices unchanged."
          else
            TIMESTAMP=$(date -u "+%Y-%m-%d %H:%M UTC")
            git commit -m "chore: update prices [${TIMESTAMP}] [skip ci]"
            git push
            echo "Data files committed and pushed successfully."
          fi
