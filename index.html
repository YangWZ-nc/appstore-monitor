<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App Store 价格监控</title>
  <style>
    :root {
      --bg: #0d1117;
      --card: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --green: #3fb950;
      --red: #f85149;
      --gold: #f0c40a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh; padding: 24px 16px;
    }
    header {
      text-align: center; margin-bottom: 32px;
    }
    header h1 {
      font-size: 1.8rem; color: var(--accent);
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .meta { color: var(--muted); font-size: 0.85rem; margin-top: 8px; }
    .stats {
      display: flex; justify-content: center; gap: 24px; margin-bottom: 28px;
      flex-wrap: wrap;
    }
    .stat-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px 28px; text-align: center;
    }
    .stat-card .num { font-size: 2rem; font-weight: 700; color: var(--accent); }
    .stat-card .label { font-size: 0.8rem; color: var(--muted); }
    .table-wrap {
      overflow-x: auto;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px;
    }
    table {
      width: 100%; border-collapse: collapse;
    }
    thead tr { background: #1c2128; }
    th, td {
      padding: 12px 16px; text-align: left;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    th { color: var(--muted); font-size: 0.82rem; text-transform: uppercase; font-weight: 600; }
    tbody tr:hover { background: #1c2128; }
    tbody tr:last-child td { border-bottom: none; }
    .app-icon { width: 52px; height: 52px; border-radius: 12px; object-fit: cover; }
    .app-icon-placeholder {
      width: 52px; height: 52px; border-radius: 12px;
      background: var(--border); display: flex; align-items: center;
      justify-content: center; font-size: 0.7rem; color: var(--muted);
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .genre { color: var(--muted); font-size: 0.78rem; }
    .price { font-weight: 700; font-size: 1.05rem; }
    .price.free { color: var(--green); }
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 20px;
      font-size: 0.75rem; font-weight: 600;
    }
    .badge-success { background: rgba(63,185,80,.2); color: var(--green); }
    .badge-error   { background: rgba(248,81,73,.2); color: var(--red); }
    details summary {
      cursor: pointer; color: var(--accent); font-size: 0.85rem;
      padding: 4px 0; user-select: none;
    }
    .iap-table { width: 100%; margin-top: 8px; font-size: 0.82rem; }
    .iap-table th, .iap-table td {
      padding: 4px 8px; border-bottom: 1px solid var(--border);
    }
    .iap-table th { font-size: 0.75rem; }
    .no-iap { color: var(--muted); font-size: 0.82rem; }
    footer { text-align: center; color: var(--muted); font-size: 0.78rem; margin-top: 32px; }
    @media(max-width: 600px) {
      th:nth-child(4), td:nth-child(4) { display: none; }
    }
  </style>
</head>
<body>
  <header>
    <h1>🍎 App Store 价格监控</h1>
    <p class="meta">美区（US） · 最近更新：2026-03-25 19:00 UTC</p>
  </header>

  <div class="stats">
    <div class="stat-card">
      <div class="num">2</div>
      <div class="label">监控 App 数量</div>
    </div>
    <div class="stat-card">
      <div class="num" style="color:var(--green)">
        2
      </div>
      <div class="label">当前免费</div>
    </div>
    <div class="stat-card">
      <div class="num" style="color:var(--gold)">
        0
      </div>
      <div class="label">内购项目总数</div>
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>图标</th>
          <th>App 名称</th>
          <th>本体价格</th>
          <th>状态</th>
          <th>内购项目</th>
        </tr>
      </thead>
      <tbody>
        
        <tr>
          <td><img src="https://is1-ssl.mzstatic.com/image/thumb/Purple221/v4/c0/94/ab/c094ab41-a44a-4da8-737f-7aad8d97b8b6/AppIcon-0-0-1x_U007epad-0-0-0-1-0-0-sRGB-0-85-220.png/100x100bb.jpg" alt="WhatsApp Messenger" class="app-icon"></td>
          <td><a href="https://apps.apple.com/us/app/whatsapp-messenger/id310633997?uo=4" target="_blank" rel="noopener">WhatsApp Messenger</a><br>
              <small class="genre">Social Networking, Utilities</small></td>
          <td class="price free">免费</td>
          <td><span class="badge badge-success">正常</span></td>
          <td><span class="no-iap">无内购</span></td>
        </tr>

        <tr>
          <td><img src="https://is1-ssl.mzstatic.com/image/thumb/Purple211/v4/b7/68/4e/b7684ee2-68b5-0b77-b13d-38c858064514/logo_youtube_2024_q4_color-0-1x_U007emarketing-0-0-0-7-0-0-0-85-220-0.png/100x100bb.jpg" alt="YouTube" class="app-icon"></td>
          <td><a href="https://apps.apple.com/us/app/youtube/id544007664?uo=4" target="_blank" rel="noopener">YouTube</a><br>
              <small class="genre">Photo & Video, Entertainment</small></td>
          <td class="price free">免费</td>
          <td><span class="badge badge-success">正常</span></td>
          <td><span class="no-iap">无内购</span></td>
        </tr>
      </tbody>
    </table>
  </div>

  <footer>
    <p>由 GitHub Actions 自动运行 · 数据来源：iTunes API & App Store</p>
    <p style="margin-top:4px">⚠️ 价格仅供参考，请以 App Store 实际页面为准</p>
  </footer>
</body>
</html>
